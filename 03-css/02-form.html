<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>CSS Exercise 02 - Form</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="form-page">
    <main>
      <section class="form-card">
        <h1 class="form-title">Roth IRA Calculator</h1>

        <form action="#">
          <div class="form-row">
            <label for="balance">Balance ($)</label>
            <input type="text" id="balance" name="balance" />
          </div>

          <div class="form-row">
            <label for="contribution">Annual contribution ($)</label>
            <input type="text" id="contribution" name="contribution" />
          </div>

          <fieldset>
            <legend>Maximize contribution?</legend>

            <div class="radio-options">
              <label class="radio-label">
                <input type="radio" name="maximize" value="yes" />
                Yes
              </label>

              <label class="radio-label">
                <input type="radio" name="maximize" value="no" />
                No
              </label>
            </div>
          </fieldset>

          <div class="form-row">
            <label for="rate">Expected rate of return (%)</label>
            <input type="number" id="rate" name="rate" />
          </div>

          <div class="form-row">
            <label for="current-age">Current age</label>
            <input type="number" id="current-age" name="current-age" />
          </div>

          <div class="form-row">
            <label for="retirement-age">Retirement age</label>
            <input type="number" id="retirement-age" name="retirement-age" />
          </div>

          <div class="form-row">
            <label for="tax-rate">Marginal tax rate (%)</label>
            <input type="number" id="tax-rate" name="tax-rate" />
          </div>

          <div class="button-row">
            <input class="btn btn-primary" type="submit" value="Calculate" />
            <input class="btn btn-secondary" type="reset" value="Reset" />
          </div>
        </form>

        <p class="form-note">
          This exercise is a simplified version of the Roth IRA Calculator at
          <a href="https://www.calculator.net/roth-ira-calculator.html"
            >Calculator.net</a
          >
        </p>
      </section>
    </main>
  </body>
</html>
